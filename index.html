<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zia Decoration Wholesale</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d4b2a;
overflow-x:hidden;
}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:25px;

position:relative;

background:
linear-gradient(rgba(8,40,20,.78),rgba(8,40,20,.88)),
url("background.jpg");

background-size:cover;

background-position:center;

}

.hero::before{

content:"";

position:absolute;

top:0;

left:0;

right:0;

bottom:0;

background:
radial-gradient(circle at top right,rgba(255,215,0,.20),transparent 40%),
radial-gradient(circle at bottom left,rgba(255,255,255,.08),transparent 35%);

}

.content{

position:relative;

z-index:2;

width:100%;

max-width:700px;

text-align:center;

}

.top-contact{

display:inline-block;

padding:10px 22px;

background:rgba(255,255,255,.12);

border:1px solid rgba(255,215,0,.40);

border-radius:40px;

color:#fff;

font-size:18px;

margin-bottom:30px;

}

h1{

font-size:52px;

color:#FFD700;

margin-bottom:15px;

font-weight:bold;

text-shadow:2px 2px 8px black;

}

.tagline{

font-size:22px;

color:white;

line-height:35px;

margin-bottom:40px;

}

.btn{

display:inline-block;

padding:18px 45px;

background:linear-gradient(#FFD700,#d4af37);

color:#05351d;

text-decoration:none;

font-size:24px;

font-weight:bold;

border-radius:50px;

box-shadow:0 8px 25px rgba(0,0,0,.35);

transition:.3s;

}

.btn:hover{

transform:scale(1.05);

}
.decor-strip{
margin-top:60px;
display:flex;
justify-content:center;
align-items:center;
gap:18px;
flex-wrap:wrap;
}

.decor-item{
width:85px;
height:85px;
background:rgba(255,255,255,.10);
border:2px solid rgba(255,215,0,.35);
border-radius:18px;
backdrop-filter:blur(6px);
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
transition:.3s;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.decor-item:hover{
transform:translateY(-8px) scale(1.05);
border-color:#FFD700;
  }
</style>

</head>

<body>

<section class="hero">

<div class="content">

<div class="top-contact">

📱 WhatsApp: 0340-2000374

</div>

<h1>

Zia Decoration Wholesale

</h1>

<p class="tagline">

Premium Decoration • Gift Items • Home Décor

</p>

<a href="products.html" class="btn">

Open Products

</a>
<div class="decor-strip">

<div class="decor-item">🏺</div>

<div class="decor-item">🪞</div>

<div class="decor-item">🏮</div>

<div class="decor-item">🕯️</div>

<div class="decor-item">🎁</div>

</div>
</div>

</section>

</body>
</html>
