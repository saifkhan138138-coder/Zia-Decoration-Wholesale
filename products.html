<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products | Zia Decoration Wholesale</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">

<h2>Zia Decoration Wholesale</h2>

</header>

<div class="summary">

<input type="number" id="searchBox" placeholder="Search Product Number">

<div class="counter">

<p>Selected Items :
<span id="selectedItems">0</span></p>

<p>Total Quantity :
<span id="totalQty">0</span></p>

</div>

</div>

<div class="products">

<!-- Product 1 -->

<div class="card">

<h3>#001</h3>

<img src="images/001.jpg" alt="Product">

<div class="qty">

<button>-</button>

<span>0</span>

<button>+</button>

</div>

<div class="tick">✔</div>

</div>

<!-- Product 2 -->

<div class="card">

<h3>#002</h3>

<img src="images/002.jpg" alt="Product">

<div class="qty">

<button>-</button>

<span>0</span>

<button>+</button>

</div>

<div class="tick">✔</div>

</div>

</div>

<div class="order">

<button id="orderBtn">

Order on WhatsApp

</button>

</div>

<script src="script.js"></script>

</body>
  </html>
