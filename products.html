<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products | Zia Decoration Wholesale</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<header class="topbar">

<a href="index.html" class="back-btn">← Back</a>

<div>
<h2>Zia Decoration Wholesale</h2>
<p>Our Premium Collection</p>
</div>

</header>



<section class="summary">


<div class="search-area">

<input type="number" id="searchBox" placeholder="Search Product Number">

<button id="searchBtn">
🔍
</button>

</div>



<div class="counter">

<p>
Selected Items :
<span id="selectedItems">0</span>
</p>


<p>
Total Quantity :
<span id="totalQty">0</span>
</p>


</div>


</section>




<section class="products">



<div class="card" data-number="001">


<h3>#001</h3>

<img src="images/001.jpg" alt="Product 001">


<div class="qty">

<button>-</button>

<span>0</span>

<button>+</button>


</div>


<div class="tick">
✔
</div>


</div>





<div class="card" data-number="002">


<h3>#002</h3>

<img src="images/002.jpg" alt="Product 002">


<div class="qty">

<button>-</button>

<span>0</span>

<button>+</button>


</div>


<div class="tick">
✔
</div>


</div>



</section>






<section class="customer-form">


<h3>Customer Information</h3>


<input type="text" id="customerName" placeholder="Customer Name">


<input type="tel" id="customerPhone" placeholder="Mobile Number">


<input type="text" id="customerCity" placeholder="City">


<input type="text" id="customerAddress" placeholder="Address (Optional)">



</section>





<div class="order">


<button id="orderBtn">

Order on WhatsApp

</button>


</div>





<script src="script.js"></script>


</body>
</html>
