<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products | Zia Decoration Wholesale</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">

<a href="index.html" class="back-btn">← Back</a>

</header>

<section class="summary">

<div class="search-area">

<input
type="number"
id="searchBox"
placeholder="Search Product Number">

<button id="searchBtn">🔍</button>

<button
id="clearSearchBtn"
class="clear-btn"
type="button">
&times;
</button>

</div>

<div class="counter">

<p>
Selected Items :
<span id="selectedItems">0</span>
</p>

<p>
Total Quantity :
<span id="totalQty">0</span>
</p>

</div>

</section>

<div class="grid">
